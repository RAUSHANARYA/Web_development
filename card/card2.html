<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      .container {
        height: 100vh;
        width: 100%;
        background: #de83b3;
        background: linear-gradient(
          90deg,
          rgba(222, 131, 179, 1) 0%,
          rgba(255, 102, 102, 1) 59%
        );
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
      }
      .card {
        width: 20%; /* Any percentage width */
        height: 60%; /* Must be auto to allow the ratio to work */
        aspect-ratio: 16 / 9;
        background-color: azure;
        border-radius: 10px;

        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        text-align: center;
      }
      .image {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      img {
        border-top-left-radius: 10px;
        border-top-right-radius: 10px;
        width: 100%;
      }
      h3 {
        font-size: 1.5rem;
      }
      .amount {
        width: 85%;
        height: 11%;
        background-color: rgb(175, 28, 82);
        border-radius: 5px;
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        text-align: center;
        padding: 10px;
        a{
            color: aliceblue;
        }
        .lefticon , h4
        {
             color: aliceblue;
             display: flex;
             flex-direction: row;
             gap: 10px;
             align-items: center;
        }
     

      }
      h4{
        width: 70px;
        font-size:small;
      }
      .login{
         width: 85%;
        height: 11%;
        
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        text-align: center;
      }
      .login button
      {
         width: 100%;
        height: 100%;
        background-color: rgb(30, 30, 115);
        color: aliceblue;
        border: none;
        cursor: pointer;
         border-radius: 5px;
        
      }
      button:active
      {
        background-color: rgb(0, 0, 0);
      }
      button:hover{
        color: black;
       box-shadow: 2px 2px 4px;
      }
    
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div class="image">
          <img
            src="https://traiestemuzica.ro/wp-content/uploads/2026/02/UNTOLD-x-Apple-Music-16x9-1.jpg"
            alt="#"
          />
        </div>
        <div class="text">
          <h3>Order Summary</h3>
          <br />
          <p>
            Lorem ipsum dolor sit amet consectetur adipisicing elit. Fugit,
            odit?
          </p>
        </div>
        <div class="amount">
          <div class="lefticon">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              fill="currentColor"
              class="bi bi-music-note"
              viewBox="0 0 16 16"
            >
              <path
                d="M9 13c0 1.105-1.12 2-2.5 2S4 14.105 4 13s1.12-2 2.5-2 2.5.895 2.5 2"
              />
              <path fill-rule="evenodd" d="M9 3v10H8V3z" />
              <path
                d="M8 2.82a1 1 0 0 1 .804-.98l3-.6A1 1 0 0 1 13 2.22V4L8 5z"
              />
            </svg>
            <h4>Annual plan 999/- year</h4>
          </div>
          
         <div class="rightlink">
            <a href="#">change</a>
         </div>
        </div>
        <div class="login">
           <button> Proceed to payment </button>
        </div>
      </div>
    </div>
  </body>
</html>
