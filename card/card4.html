<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      .container {
        height: 100vh;
        width: 100%;
        background: #de83b3;
        background: linear-gradient(
          90deg,
          rgba(222, 131, 179, 1) 0%,
          rgba(255, 102, 102, 1) 59%
        );
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        cursor: pointer;
        /* font-family: Arial, Helvetica, sans-serif; */
       
       
      }
      .card {
        width: 25%; /* Any percentage width */
        height: 60%; /* Must be auto to allow the ratio to work */
        aspect-ratio: 16 / 9;
        background-color: azure;
        border-radius: 10px;
        box-shadow: 0px 0px 7px;

        display: flex;
        flex-direction: column;
        align-items: center;
        /* gap: 5px; */
        text-align: start;
        transition: transform 0.1s ease-in;

        .text {
          padding: 20px;
          line-height: 17px;
        }
      }
      .image {
        display: flex;
        align-items: center;
        justify-content: center;
          position: relative;

 .starBox {
  position: absolute;
  top: 10px;
  right: 10px;

  #star {
  background-color: rgb(183, 75, 17);
  color: white;
  padding: 6px 12px;
  border-radius: 20px;
  font-weight: bold;
  font-size: 14px;
}
}
      }
      img {
        border-top-left-radius: 10px;
        border-top-right-radius: 10px;
        width: 100%;
      }
      h3 {
        font-size: 1.5rem;
      }
      .amount {
        width: 85%;
        height: 11%;
        background-color: rgb(175, 28, 82);
        border-radius: 5px;
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        text-align: center;
        padding: 10px;
        a {
          color: aliceblue;
        }
        .lefticon,
        h4 {
          color: aliceblue;
          display: flex;
          flex-direction: row;
          gap: 10px;
          align-items: center;
        }
      }
      h4 {
        width: 70px;
        font-size: small;
      }
      .login {
        width: 90%;
        height: 11%;

        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        text-align: center;
        margin-top: 20px;
    
         
      }
      .login button {
        width: 100%;
        height: 90%;
        background-color: rgb(183, 75, 17);
        color: aliceblue;
        border: none;
        cursor: pointer;
        border-radius: 8px;
        font-size: large;
         
      }
    
    .login button:hover {
    background-color: rgb(215, 109, 51);
     }
      .seo
      {
        display: flex;
        flex-direction: row;
        gap: 10px;
        justify-content: start;
        align-self: start;
        padding-left: 20px;
        
        .boxes
        {
        height: 20px;
        width: 60px;
        background-color: gainsboro;
        border-radius: 4px;
        display: flex;
        justify-content: center;
        align-items: center;
       
        }
        
      }
      .card:hover {
       transform: scale(1.02); 
      }
 
      
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div class="image">
          <img src="./mangotree.avif" alt="#" />
          <div class="starBox">
            <div id="star">&star; 3.6</div>
          </div>
        </div>
        <div class="text">
          <h3>Under The Mango Tree</h3>
          <br />
          <p>
            Enjoy the thrill of grill and barbecue at Under The Mango Tree
            restaurant at Jehan Numa Palace, Bhopal. Head here now!
          </p>
        </div>
        <div class="seo">
           <div class="boxes">indian</div>
           <div class="boxes">chinese</div>
           <div class="boxes">ittalic</div>
        </div>
        <div class="login">
          <button>Explore Menu</button>
        </div>
      </div>
    </div>
  </body>
</html>
