      @media screen and (min-width: 0px) and (max-width: 1280px) {
        .container {
          display: flex;
          flex-direction: column;
          justify-content: space-between;
          height: 100vh;
          gap: 20px;
        }
        .box {
          background-color: rgb(180, 255, 220);
        }
      }
      @media (min-width: 1200px) {
        .container {
          display: flex;
          flex-direction: row;
          justify-content: space-between;
         
          background-color: rgb(154, 244, 244);

        }
        .boxcontainer {
          margin: 100px;
          margin-left: 10%;
          padding: 30px;
          background-color: blue;
        }
        img {
          height: 500px;
          width: 500px;
        }
        .img {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
          }
      }
    </style>
