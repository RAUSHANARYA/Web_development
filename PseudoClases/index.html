<!-- 
 
1. :hover
It is used when the mouse comes over an element.
Example: When you move the cursor on a button, its color changes.

2. :active
It is used when the element is being clicked.
Example: When you press a button, it looks slightly pressed or smaller.

3. :focus
It is used when an element is selected (by clicking or using Tab key).
Example: When you click on an input box, it shows a border or outline or blinking use in input field 

4. :visited
It is used for links that have already been opened.
Example: A visited link changes its color (only works on <a> tag).

5. :disabled
It is used when an element is disabled and cannot be used.
Example: A disabled button becomes gray and cannot be clicked.

Final line (important for exam):
Pseudo-classes are used to define different states of an element like hover, active, focus, visited, and disabled.

-->
