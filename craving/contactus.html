<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Section</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
    }

    /* Background section */
    .contact-section {
      background: url('https://images.unsplash.com/photo-1414235077428-338989a2e8c0') no-repeat center center/cover;
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 40px;
    }

    /* Form Card */
    .contact-card {
      background: #ffffff;
      padding: 30px;
      border-radius: 12px;
      width: 80%;
      max-width: 350px;
      height: 520px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    .contact-card h3 {
      color: #ee5a0a;
      font-weight: 700;
    }

    .contact-card p {
      font-size: 14px;
      color: #373737;
    }

    /* Input fields */
    .form-control {
      border-radius: 8px;
      padding: 10px;
      font-size: 14px;
    }

    .form-control:focus {
      box-shadow: none;
      border-color:#ee5a0a;
    }

    /* Button */
    .btn-custom {
      background:#ee5a0a;
      color: white;
      border-radius: 8px;
      padding: 10px;
      font-weight: 600;
      transition: 0.3s;
    }

    .btn-custom:hover {
      background: #a93226;
    }
  </style>
</head>

<body>

<section class="contact-section">
  <div class="container">
    <div class="row">
      
      <!-- Contact Form -->
      <div class="col-md-5">
        <div class="contact-card">

          <h3 class="mb-2">Contact Us</h3>
          <p class="mb-4">Have a question? We'd love to hear from you.</p>

          <form>
            <div class="mb-3">
              <input type="text" class="form-control" placeholder="Enter your full name">
            </div>

            <div class="mb-3">
              <input type="email" class="form-control" placeholder="Enter your email">
            </div>

            <div class="mb-3">
              <input type="tel" class="form-control" placeholder="Enter your phone number">
            </div>

            <div class="mb-3">
              <input type="text" class="form-control" placeholder="What is this about?">
            </div>

            <div class="mb-3">
              <textarea class="form-control" rows="4" placeholder="Write your message here..."></textarea>
            </div>

            <button class="btn btn-custom w-100">Send Message</button>
          </form>

        </div>
      </div>

    </div>
  </div>
</section>

</body>
</html>
