<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback Form</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root {
      --primary-orange: #d35400;
      --hover-orange: #b84300;
      --light-orange: #f1c6a8;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
    }

    .feedback-section {
      background: url('https://images.unsplash.com/photo-1555992336-03a23c7b20ee') no-repeat center/cover;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 40px;
    }

    .feedback-card {
      background: #f8f8f8;
      padding: 30px;
      border-radius: 12px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    }

    .feedback-card h4 {
      color: var(--primary-orange);
      font-weight: 700;
      text-align: center;
    }

    .feedback-card p {
      font-size: 14px;
      color: #666;
      text-align: center;
    }

    label {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 5px;
    }

    .form-control, .form-select {
      border-radius: 8px;
      font-size: 14px;
      border: 1px solid var(--light-orange);
    }

    .form-control:focus, .form-select:focus {
      border-color: var(--primary-orange);
      box-shadow: none;
    }

    .rating i {
      color: #ccc;
      cursor: pointer;
      font-size: 18px;
    }

    .btn-orange {
      background: var(--primary-orange);
      color: #fff;
      border-radius: 8px;
      font-weight: 600;
      padding: 10px;
      transition: 0.3s;
    }

    .btn-orange:hover {
      background: var(--hover-orange);
    }
  </style>
</head>

<body>

<section class="feedback-section">
  <div class="feedback-card">

    <h4>Share Feedback</h4>
    <p>Help us improve your Cravings experience.</p>

    <form>
      <div class="mb-3">
        <label>Full Name</label>
        <input type="text" class="form-control" placeholder="Enter your full name">
      </div>

      <div class="mb-3">
        <label>Email</label>
        <input type="email" class="form-control" placeholder="Enter your email">
      </div>

      <div class="mb-3">
        <label>Feedback Category</label>
        <select class="form-select">
          <option>Select a category</option>
          <option>Food Quality</option>
          <option>Service</option>
          <option>Delivery</option>
        </select>
      </div>

      <div class="mb-3">
        <label>Overall Rating</label>
        <div class="rating">
          ★ ★ ★ ★ ★
        </div>
      </div>

      <div class="mb-3">
        <label>Your Feedback</label>
        <textarea class="form-control" rows="3" placeholder="Tell us about your experience..."></textarea>
      </div>

      <button class="btn btn-orange w-100">Submit Feedback</button>
    </form>

  </div>
</section>

</body>
</html>
