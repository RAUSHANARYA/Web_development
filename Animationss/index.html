transform: none|transform-functions|initial|inherit;

1. translate()-X,Y
Used to move an element from its original position.
Example: transform: translate(50px, 20px);
Moves element right and down.

2. scale()-X,Y,Z3d
Used to increase or decrease the size of an element.
Example: transform: scale(1.5);
Makes element bigger.

3. rotate()-X,Y,Z
Used to rotate an element.
Example: transform: rotate(45deg);
Rotates element by 45 degrees.

4. skew()- X,Y
Used to tilt or slant an element.
Example: transform: skew(20deg);
Tilts the element.


5. matrix()
Used to apply multiple transformations together.
Example: transform: matrix(1, 0, 0.5, 1, 50, 20);
Used for complex transformations.
