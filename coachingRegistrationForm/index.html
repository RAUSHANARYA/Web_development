<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <!-- bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h3>Coaching Institute Registration Form</h3>
      </div>
      <div class="PI">
        <h4>1. Personal Information :</h4>
        <div class="inputs">
          <form>
            <label for=""> Full name : </label>
            <input
              type="text"
              name=""
              id="name"
              placeholder="Enter your name"
              required
            />
            <br />
            <label for=""> Email Address : </label>
            <input
              type="email"
              name=""
              id="email"
              placeholder="Enter your email"
              required
            />
            <br />
            <label for=""> Mobile Number : </label>
            <input
              type="number"
              name=""
              id="number"
              placeholder="Enter your phone no."
              required
            />
            <br />
            <label for=""> Date of Birth : </label>
            <input type="date" name="" id="Dob" required />
            <br />
            <!-- Gender -->
            <label> Gender : </label>

            <div class="gender-box d-inline">
              <input type="radio" name="gender" /> Male

              <input type="radio" name="gender" /> Female

              <input type="radio" name="gender" /> Other
            </div>
            <br />
          </form>
        </div>
      </div>
      <!-- 2.      Academic Details: -->
      <div class="PI">
        <h4>2. Academic Details :</h4>
        <div class="inputs1">
          <form>
            <label for=""> Last Completed Qualification : </label>
            <select required>
              <option>select options</option>
              <option>10Th</option>
              <option>12Th</option>
              <option>Graduate</option>
              <option>Postgraduate</option>
            </select>
            <br />
            <label for=""> Percentage : </label>
            <input
              type="number"
              min="0"
              max="100"
              id="Percentage"
              placeholder="Enter your %"
              required
            />
            %
            <br />
          </form>
        </div>
      </div>
      <!-- 3.Course Information: -->
      <div class="PI">
        <h4>3. Course Information: :</h4>
        <div class="inputs1">
          <form>
            <label for=""> Preferred Course : </label>
            <select class="" required>
              <option>select options</option>
              <option>IIT-JEE</option>
              <option>NEET</option>
              <option>Banking Exams</option>
              <option>UPSC</option>
            </select>
            <br />
            <label for=""> Percentage : </label>
            <input
              type="number"
              min="0"
              max="100"
              id="Percentage"
              placeholder="Enter your %"
              required
            />
            %
            <br />
          </form>
        </div>
      </div>
      <!-- 4.      Address: -->
      <!--  -->
      <div class="PI">
        <h4>4. Address of user :</h4>
        <div class="inputs1">
          <form>
            <label for=""> Residential Address : </label>
            <input type="text" placeholder="Enter your address" />
            <br />
            <label for=""> City : </label>
            <input type="text" placeholder="Enter your city" />
            <br />
            <label for=""> Pin code : </label>
            <input
              type="number"
              min="6"
              maxlength="6"
              placeholder="Enter your pin code"
            />

            <br />
          </form>
        </div>
      </div>
      <!--  -->
      <div class="PI">
        <h4>5.Guardian Details :</h4>
        <div class="inputs1">
          <form>
            <label for=""> Guardians Full Name : </label>
            <input type="text" placeholder="Enter your Guardian’s" />
            <br />
            <label for=""> Guardians Contact Number : </label>
            <input type="number" placeholder="Enter your number" />

            <br />
          </form>
        </div>
      </div>

      <!--  -->
      <div class="PI">
        <h4>6. Additional Information :</h4>
        <div class="inputs1">
          <form>
            <label for=""> How did you hear about us?: </label>
            <select class="" required>
              <option>select options</option>
              <option>Friends</option>
              <option>Online Ad</option>
              <option>Newspapers</option>
              <option>Social Media</option>
            </select>

            <br />
            <label for=""> Special Requirements: </label>
            <input type="text" />

            <br />
          </form>
        </div>
      </div>

      <div class="btnn">
        <!-- Submit Button -->
        <div class="submit-btn">
          <button type="submit">Submit Form</button>
        </div>

        <!-- Clear Button -->
        <div class="clear-btn">
          <button type="reset">Clear Form</button>
        </div>
      </div>
    </div>

    <!-- BootStrap Script  -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
