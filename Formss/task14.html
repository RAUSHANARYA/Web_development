<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Doctor Appointment Form</title>
  </head>
  <body>
    <table width="100%">
      <tr>
        <!-- Left Image -->
        <td width="40%" align="center">
          <img
            src="https://imgs.search.brave.com/CrecW0UFQ9J59begeYOzgoL5St2IGpPvlNBGF-U1jlk/rs:fit:500:0:1:0/g:ce/aHR0cHM6Ly9zdGF0/aWMudmVjdGVlenku/Y29tL3N5c3RlbS9y/ZXNvdXJjZXMvdGh1/bWJuYWlscy8wMTYv/MzYwLzQzNC9zbWFs/bC90d28tZG9jdG9y/cy1vci1udXJzZXMt/b24tYS13aGl0ZS1i/YWNrZ3JvdW5kLXBo/b3RvLmpwZw"
            width="300"
          />
        </td>

        <!-- Right Form -->
        <td width="60%">
          <form>
            <table cellpadding="8">
              <tr>
                <th colspan="2" align="left">
                  <h2>Doctor Appointment Form</h2>
                  <hr />
                </th>
              </tr>

              <tr>
                <td>Appointment Date</td>
                <td><input type="date" /></td>
              </tr>

              <tr>
                <td>Appointment Time</td>
                <td><input type="time" /></td>
              </tr>

              <tr>
                <td>Name</td>
                <td>
                  <input type="text" placeholder="First Name" />
                  <input type="text" placeholder="Last Name" />
                </td>
              </tr>

              <tr>
                <td>Gender</td>
                <td>
                  <input type="radio" name="gender" /> Male
                  <input type="radio" name="gender" /> Female
                </td>
              </tr>

              <tr>
                <td>Phone</td>
                <td><input type="tel" placeholder="Enter phone" /></td>
              </tr>

              <tr>
                <td>Address</td>
                <td>
                  <input type="text" placeholder="City" />
                  <input type="text" placeholder="State" />
                </td>
              </tr>

              <tr>
                <td>Your Query</td>
                <td>
                  <textarea rows="4" cols="30"></textarea>
                </td>
              </tr>

              <tr>
                <td>Appointment Type</td>
                <td>
                  <input type="checkbox" /> Cervix checkup <br />
                  <input type="checkbox" /> Heart checkup <br />
                  <input type="checkbox" /> Eye check-up <br />
                  <input type="checkbox" /> Hearing Test
                </td>
              </tr>

              <tr>
                <td></td>
                <td>
                  <input type="submit" value="Send" />
                </td>
              </tr>
            </table>
          </form>
        </td>
      </tr>
    </table>
  </body>
</html>
