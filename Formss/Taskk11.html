<!doctype html>
<html lang="en">

    <title>Document</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <form>
      <table border="1" cellpadding="5">
        <tr>
          <th colspan="4">Registration Form</th>
        </tr>
        <tr>

          <td><input type="text" placeholder="First name" /></td>
          <td><input type="text" placeholder="Middle name" /></td>
          <td><input type="text" placeholder="last name" /></td>
        </tr>

        <tr>
          <td>Father name</td>
          <td><input type="text" placeholder="Enter your father name" /></td>
          <td>Mother name</td>
          <td><input type="text" placeholder="Enter your mother name " /></td>
        </tr>

        <tr>
          <td>Date of birth</td>
          <td><input type="date" /></td>
          <td>Gender</td>
          <td>
            Male <input type="radio" name="radio1" /> Female
            <input type="radio" name="radio1" />
          </td>
        </tr>

        <tr>
          <td>Catogery</td>
          <td>
            Gen <input type="radio" name="radio2" />OBC
            <input type="radio" name="radio2" />SC/ST
            <input type="radio" name="radio2" />
          </td>
          <td>Handicap</td>
          <td>
            yes <input type="radio" name="radio3" /> NO
            <input type="radio" name="radio3" />
          </td>
        </tr>
        <tr>
          <td>Ex-serviceman</td>
          <td>
            yes <input type="radio" name="radio4" /> NO
            <input type="radio" name="radio4" />
          </td>
          <td>EWS</td>
          <td>
            yes <input type="radio" name="radio5" /> NO
            <input type="radio" name="radio5" />
          </td>
        </tr>
        <tr>
          <td>Email id</td>
          <td><input type="email" placeholder="Enter your email " /></td>
          <td>Mobile no.</td>
          <td><input type="tel" /></td>
        </tr>
        <tr>
            <td>State</td>
            <td><select id="state">
                <option value="">Choose any one</option>
                <option value="">MP</option>
                <option value="">Up</option>
                <option value="">Bihar</option>
            </select></td>
            <td>City</td>

                <option value="">Choose any one</option>
                <option value="">bhopal</option>
                <option value="">rewa</option>
                <option value="">sagar</option>
            </select></td>
        </tr>
        <tr>
            <td>Upload a photo</td>
            <td><input type="file"></td>
            <td>Upload Siganture</td>
            <td><input type="file"></td>
        </tr>
        <tr>
            <td></td>
            <td colspan="3" id="submit"> <input type="submit" value="submit"></td>
        </tr>
